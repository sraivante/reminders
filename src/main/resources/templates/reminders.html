<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <h1>Reminder Center</h1>
    <p class="subtext">Notifications are sent daily for reminders in the window from 7 days before to 7 days after due date.</p>

    <div class="flash" th:if="${message}" th:text="${message}"></div>

    <section class="card">
        <h2 th:text="${reminderForm.id} == null ? 'Create Reminder' : 'Edit Reminder'"></h2>
        <form th:action="@{/reminders}" method="post" th:object="${reminderForm}">
            <input type="hidden" th:field="*{id}">
            <p class="error" th:if="${#fields.hasAnyErrors()}">Please fix validation errors and submit again.</p>
            <div class="grid">
                <label>
                    Reminder Title
                    <input type="text" th:field="*{title}" placeholder="Insurance renewal" required>
                    <small class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
                </label>
                <label>
                    Reminder Date & Time
                    <input type="datetime-local" th:field="*{reminderDate}" required>
                    <small class="error" th:if="${#fields.hasErrors('reminderDate')}" th:errors="*{reminderDate}"></small>
                </label>
                <label class="full">
                    Description
                    <textarea th:field="*{description}" rows="3" placeholder="Add details here" required></textarea>
                    <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
                </label>
                <label>
                    Cycle
                    <select th:field="*{cycle}" id="cycle" onchange="toggleCustomDays()">
                        <option th:each="cycle : ${cycles}" th:value="${cycle}" th:text="${cycle}"></option>
                    </select>
                </label>
                <label id="customDaysBlock">
                    Custom Days
                    <input type="number" th:field="*{customCycleDays}" min="1" placeholder="e.g. 10">
                    <small class="error" th:if="${#fields.hasErrors('customCycleDays')}" th:errors="*{customCycleDays}"></small>
                </label>
                <label>
                    Email
                    <input type="email" th:field="*{email}" placeholder="you@example.com">
                    <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                </label>
                <label>
                    WhatsApp Number
                    <input type="text" th:field="*{whatsappNumber}" placeholder="+911234567890">
                    <small class="error" th:if="${#fields.hasErrors('whatsappNumber')}" th:errors="*{whatsappNumber}"></small>
                </label>
            </div>
            <button type="submit" th:text="${reminderForm.id} == null ? 'Save Reminder' : 'Update Reminder'"></button>
            <a class="btn-secondary" th:if="${reminderForm.id} != null" th:href="@{/}">Cancel Edit</a>
            <p class="error" th:if="${#fields.hasErrors('customCycleValid')}" th:errors="*{customCycleValid}"></p>
        </form>
    </section>

    <section class="card">
        <h2>All Reminders</h2>
        <div id="titleTabs" class="tabs"></div>
        <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Date</th>
                <th>Cycle</th>
                <th>Email</th>
                <th>WhatsApp</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reminders}" class="reminder-row" th:attr="data-title=${r.title}">
                <td class="reminder-title" th:text="${r.title}"></td>
                <td th:text="${r.description}"></td>
                <td th:text="${r.reminderDate}"></td>
                <td>
                    <span th:text="${r.cycle}"></span>
                    <span th:if="${r.cycle.name() == 'CUSTOM'}" th:text="${' (' + r.customCycleDays + 'd)'}"></span>
                </td>
                <td th:text="${r.email} ?: '-'"></td>
                <td th:text="${r.whatsappNumber} ?: '-'"></td>
                <td th:text="${r.active} ? 'ACTIVE' : 'PAUSED'"></td>
                <td class="actions">
                    <a class="btn-secondary" th:href="@{'/reminders/' + ${r.id} + '/edit'}">Edit</a>
                    <form th:action="@{'/reminders/' + ${r.id} + '/duplicate'}" method="post">
                        <button type="submit" class="btn-secondary">Copy</button>
                    </form>
                    <form th:action="@{'/reminders/' + ${r.id} + '/accept'}" method="post">
                        <button type="submit">Accept</button>
                    </form>
                    <form th:action="@{'/reminders/' + ${r.id} + '/toggle-active'}" method="post">
                        <button type="submit" th:text="${r.active} ? 'Pause' : 'Resume'"></button>
                    </form>
                    <form th:action="@{'/reminders/' + ${r.id} + '/delete'}" method="post">
                        <button type="submit" class="danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </section>
</main>
<script>
    function toggleCustomDays() {
        const cycle = document.getElementById('cycle').value;
        const block = document.getElementById('customDaysBlock');
        block.style.display = cycle === 'CUSTOM' ? 'block' : 'none';
    }

    function createTitleTabs() {
        const tabsHost = document.getElementById('titleTabs');
        const rows = Array.from(document.querySelectorAll('.reminder-row'));
        if (!tabsHost || rows.length === 0) {
            return;
        }

        const titleSet = new Set();
        rows.forEach((row) => {
            const title = (row.getAttribute('data-title') || '').trim();
            if (title) {
                titleSet.add(title);
            }
        });

        const tabs = [{label: 'All', value: 'ALL'}, ...Array.from(titleSet).map((t) => ({label: t, value: t}))];

        function setActive(filterValue) {
            rows.forEach((row) => {
                const title = (row.getAttribute('data-title') || '').trim();
                row.style.display = (filterValue === 'ALL' || title === filterValue) ? '' : 'none';
            });
            Array.from(tabsHost.querySelectorAll('button')).forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.filter === filterValue);
            });
        }

        tabs.forEach((tab) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'tab-btn';
            btn.textContent = tab.label;
            btn.dataset.filter = tab.value;
            btn.addEventListener('click', () => setActive(tab.value));
            tabsHost.appendChild(btn);
        });

        setActive('ALL');
    }

    toggleCustomDays();
    createTitleTabs();
</script>
</body>
</html>
